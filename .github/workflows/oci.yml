name: OCI ARM Instance Creator

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-dev

      - name: Create config files
        run: |
          printf '%s' '${{ secrets.OCI_PRIVATE_KEY }}' > private_key.pem
          chmod 600 private_key.pem
          printf '%s' '${{ secrets.OCI_SSH_PUBLIC_KEY }}' > ssh_public_key.txt
          
          python3 -c "
          import os
          lines = [
            'OCI_USER_ID=${{ secrets.OCI_USER_ID }}',
            'OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}',
            'OCI_REGION=${{ secrets.OCI_REGION }}',
            'OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}',
            'OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}',
            'OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}',
            'OCI_OCPUS=4',
            'OCI_MEMORY_IN_GBS=24',
            'OCI_BOOT_VOLUME_SIZE_IN_GBS=200',
            'OCI_OPERATING_SYSTEM=Ubuntu',
            'OCI_OPERATING_SYSTEM_VERSION=22.04',
            'OCI_PRIVATE_KEY_FILE_PATH=./private_key.pem',
          ]
          with open('.env', 'w') as f:
            f.write('\n'.join(lines) + '\n')
          with open('ssh_public_key.txt', 'r') as f:
            ssh_key = f.read().strip()
          with open('.env', 'a') as f:
            f.write('OCI_SSH_PUBLIC_KEY=' + repr(ssh_key) + '\n')
          "

      - name: Run OCI capacity check
        run: php index.php
